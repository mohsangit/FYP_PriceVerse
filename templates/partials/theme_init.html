<script>
  /* Apply saved theme synchronously to avoid flash of wrong theme */
  (function () {
    try {
      var saved = localStorage.getItem("pv-theme");
      if (saved !== "dark" && saved !== "light") {
        saved = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
      }
      document.documentElement.setAttribute("data-theme", saved);
    } catch (e) {
      document.documentElement.setAttribute("data-theme", "light");
    }

    function syncToggles(theme) {
      document.querySelectorAll("[data-theme-toggle]").forEach(function (btn) {
        btn.setAttribute("aria-pressed", theme === "dark" ? "true" : "false");
        btn.setAttribute("aria-label", theme === "dark" ? "Switch to light mode" : "Switch to dark mode");
        btn.setAttribute("title", theme === "dark" ? "Light mode" : "Dark mode");
      });
    }

    function setTheme(theme) {
      document.documentElement.setAttribute("data-theme", theme);
      try { localStorage.setItem("pv-theme", theme); } catch (e) {}
      syncToggles(theme);
    }

    window.__pvSetTheme = setTheme;

    document.addEventListener("DOMContentLoaded", function () {
      syncToggles(document.documentElement.getAttribute("data-theme"));
      document.addEventListener("click", function (e) {
        var btn = e.target.closest("[data-theme-toggle]");
        if (!btn) return;
        e.preventDefault();
        var current = document.documentElement.getAttribute("data-theme");
        setTheme(current === "dark" ? "light" : "dark");
      });
    });
  })();
</script>
