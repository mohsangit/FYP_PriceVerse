<button
  type="button"
  class="favorite-btn{% if product.id in favorite_product_ids %} favorite-btn--active{% endif %}"
  data-product-id="{{ product.id }}"
  data-toggle-url="{% url 'products:toggle_favorite' product_id=product.id %}"
  data-login-url="{% url 'accounts:login' %}"
  aria-label="{% if product.id in favorite_product_ids %}Remove from favorites{% else %}Add to favorites{% endif %}"
  title="{% if product.id in favorite_product_ids %}Remove from favorites{% else %}Add to favorites{% endif %}"
>
  <svg class="favorite-btn__icon favorite-btn__icon--outline" viewBox="0 0 24 24" aria-hidden="true">
    <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z" fill="none" stroke="currentColor" stroke-width="1.8"/>
  </svg>
  <svg class="favorite-btn__icon favorite-btn__icon--filled" viewBox="0 0 24 24" aria-hidden="true">
    <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z" fill="currentColor"/>
  </svg>
</button>
